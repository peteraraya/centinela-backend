name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Nota: Normalmente Vercel despliega automáticamente si conectas el repositorio a Vercel.
      # Si prefieres forzar el despliegue mediante GitHub Actions, puedes usar el CLI de Vercel.
      # Para que esto funcione, necesitas agregar VERCEL_TOKEN, VERCEL_ORG_ID, y VERCEL_PROJECT_ID 
      # en los "Secrets" de tu repositorio de GitHub.
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
